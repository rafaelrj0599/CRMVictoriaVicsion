{% extends "base.html" %}
{% block public %}
<div class="d-flex align-items-center justify-content-center vh-100" style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 60%, #312e81 100%);">
  <div class="col-md-4 col-lg-3">
    <div class="text-center mb-4">
      <div style="font-size:3rem; color:#a78bfa;"><i class="bi bi-eye-fill"></i></div>
      <h2 class="text-white fw-bold mb-0">Victoria Vicsion</h2>
      <p class="text-secondary">CRM de Jornadas Visuales</p>
    </div>
    <div class="card border-0 shadow-lg" style="border-radius:16px;">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-1">Iniciar sesión</h5>
        <p class="text-muted small mb-3">Ingresa tus credenciales</p>
        {% if error %}
          <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}
        <form method="post">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Usuario</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input class="form-control" name="username" placeholder="tu_usuario" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label small fw-semibold">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input class="form-control" type="password" name="password" placeholder="••••••" required>
            </div>
          </div>
          <button class="btn btn-primary w-100 fw-semibold" style="background:#7c3aed; border-color:#7c3aed;">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
